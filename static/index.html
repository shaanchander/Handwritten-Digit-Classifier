<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Digit Classifier</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div>
        <p class="eyebrow">Local MNIST inference</p>
        <h1>Draw a digit. Get a prediction.</h1>
      </div>
      <p class="subhead">Runs locally in your browser from the same FastAPI server.</p>
    </section>

    <div class="content-grid">
      <section class="left-column">
        <section class="panel controls">
          <label>
            Model
            <select id="modelType">
              <option value="cnn">CNN</option>
              <option value="fcnn">FCNN</option>
            </select>
          </label>
          <div class="actions">
            <button id="predictBtn">Predict</button>
            <button id="clearBtn" class="secondary">Clear</button>
          </div>
        </section>

        <section class="panel workspace">
          <canvas id="canvas" width="280" height="280"></canvas>
          <div class="hint">Draw a single digit with your mouse or trackpad.</div>
        </section>
      </section>

      <section class="panel results">
        <div class="result-header">
          <div>
            <p class="label">Prediction</p>
            <div id="prediction" class="prediction">-</div>
          </div>
          <div>
            <p class="label">Confidence</p>
            <div id="confidence" class="confidence">-</div>
          </div>
        </div>
        <div id="status" class="status">Ready.</div>
        <div id="bars" class="bars"></div>
      </section>
    </div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
